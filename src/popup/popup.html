<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VanishMe</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>VanishMe</h1>
      <div class="global-toggle">
        <label class="switch">
          <input type="checkbox" id="globalEnabled">
          <span class="slider"></span>
        </label>
        <span id="globalStatus">全局保护</span>
      </div>
    </header>

    <section class="site-status">
      <div class="site-info">
        <span class="label">当前网站：</span>
        <span id="currentSite">-</span>
      </div>
      <div class="site-actions">
        <button id="enableSite" class="btn-secondary">启用</button>
        <button id="disableSite" class="btn-secondary">禁用</button>
      </div>
    </section>

    <section class="profile-section">
      <h2>快速配置</h2>
      <select id="profileSelect" class="input">
        <option value="">自定义</option>
        <option value="singapore">新加坡</option>
        <option value="japan">日本</option>
        <option value="germany">德国</option>
        <option value="united-states">美国</option>
        <option value="china">中国</option>
      </select>
      <button id="applyProfile" class="btn-primary">应用配置</button>
    </section>

    <section class="config-section">
      <details open>
        <summary>地理位置</summary>
        <div class="config-content">
          <label class="checkbox-label">
            <input type="checkbox" id="geolocationEnabled">
            <span>启用</span>
          </label>
          <div class="input-group">
            <label>纬度：</label>
            <input type="number" id="latitude" class="input" step="any" min="-90" max="90">
          </div>
          <div class="input-group">
            <label>经度：</label>
            <input type="number" id="longitude" class="input" step="any" min="-180" max="180">
          </div>
          <div class="input-group">
            <label>精度 (米)：</label>
            <input type="number" id="accuracy" class="input" step="1" min="1">
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="randomize">
            <span>随机偏移</span>
          </label>
          <div class="input-group">
            <label>随机半径 (米)：</label>
            <input type="number" id="randomRadiusMeters" class="input" step="1" min="0">
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="spoofPermission">
            <span>伪装权限</span>
          </label>
          <button id="saveCoordinate" class="btn-secondary btn-sm">保存当前坐标</button>
          <button id="getFromIP" class="btn-secondary btn-sm">从 IP 获取位置</button>
        </div>
      </details>

      <details>
        <summary>时区</summary>
        <div class="config-content">
          <label class="checkbox-label">
            <input type="checkbox" id="timezoneEnabled">
            <span>启用</span>
          </label>
          <div class="input-group">
            <label>时区：</label>
            <input type="text" id="timezone" class="input" placeholder="Asia/Singapore">
          </div>
          <div class="input-group">
            <label>UTC 偏移 (小时)：</label>
            <input type="number" id="utcOffset" class="input" step="0.5" placeholder="-7">
            <small style="color: #888; display: block; margin-top: 4px;">例如：-7 表示 UTC-7 (洛杉矶)，+8 表示 UTC+8 (新加坡)</small>
          </div>
        </div>
      </details>

      <details>
        <summary>语言</summary>
        <div class="config-content">
          <label class="checkbox-label">
            <input type="checkbox" id="languageEnabled">
            <span>启用</span>
          </label>
          <div class="input-group">
            <label>主语言：</label>
            <input type="text" id="language" class="input" placeholder="en-US">
          </div>
          <div class="input-group">
            <label>语言列表：</label>
            <input type="text" id="languages" class="input" placeholder="en-US, en">
          </div>
          <div class="input-group">
            <label>Accept-Language：</label>
            <input type="text" id="acceptLanguage" class="input" placeholder="en-US,en;q=0.9">
          </div>
        </div>
      </details>

      <details>
        <summary>WebRTC 防泄漏</summary>
        <div class="config-content">
          <label class="checkbox-label">
            <input type="checkbox" id="webrtcEnabled">
            <span>启用</span>
          </label>
          <div class="input-group">
            <label>策略：</label>
            <select id="webrtcPolicy" class="input">
              <option value="default">默认</option>
              <option value="default_public_interface_only">仅公网接口</option>
              <option value="default_public_and_private_interfaces">公网和私网</option>
              <option value="disable_non_proxied_udp">禁用非代理 UDP（推荐）</option>
            </select>
          </div>
        </div>
      </details>
    </section>

    <footer>
      <button id="save" class="btn-primary">保存</button>
      <button id="openLeakTest" class="btn-secondary">隐私检测</button>
      <button id="reset" class="btn-secondary">重置</button>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
