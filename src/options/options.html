<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VanishMe 配置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>VanishMe 配置</h1>
    </header>

    <section class="section">
      <h2>全局设置</h2>
      <div class="settings-grid">
        <label class="checkbox-label">
          <input type="checkbox" id="globalEnabled">
          <span>启用全局保护</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="debugMode">
          <span>调试模式（控制台输出详细日志）</span>
        </label>
      </div>
    </section>

    <section class="section">
      <h2>匹配模式</h2>
      <div class="match-mode-container">
        <div class="input-group">
          <label>模式:</label>
          <select id="matchMode" class="input">
            <option value="global">全局模式 - 对所有网站启用</option>
            <option value="whitelist">白名单模式 - 仅对列表中的网站启用</option>
            <option value="blacklist">黑名单模式 - 对除列表外的网站启用</option>
          </select>
        </div>
        <div class="input-group">
          <label>域名列表（每行一个，支持通配符 *）:</label>
          <textarea id="domainList" class="input domain-textarea" rows="15" placeholder="例如：&#10;chatgpt.com&#10;*.google.com&#10;*openai*&#10;&#10;通配符说明：&#10;- chatgpt.com (精确匹配)&#10;- *.openai.com (匹配所有子域名)&#10;- *openai* (匹配包含 openai 的域名)"></textarea>
          <div class="hint">提示：使用 * 作为通配符。例如 *.example.com 匹配所有子域名，*keyword* 匹配包含关键词的域名</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>当前配置</h2>
        <button id="saveAsCustom" class="btn-secondary">另存为自定义配置</button>
      </div>

      <div class="config-tabs">
        <button class="tab-btn active" data-tab="geolocation">地理位置</button>
        <button class="tab-btn" data-tab="timezone">时区</button>
        <button class="tab-btn" data-tab="language">语言</button>
        <button class="tab-btn" data-tab="webrtc">WebRTC</button>
      </div>

      <div class="tab-content active" data-tab="geolocation">
        <div class="action-buttons" style="margin-bottom: 16px;">
          <button id="getFromIP" class="btn-primary" style="width: 100%;">🌐 从 IP 自动配置（地理位置 + 时区 + 语言）</button>
        </div>
        <label class="checkbox-label">
          <input type="checkbox" id="geolocationEnabled">
          <span>启用地理位置伪装</span>
        </label>
        <div class="input-row">
          <div class="input-group">
            <label>纬度:</label>
            <input type="number" id="latitude" class="input" step="any" min="-90" max="90">
          </div>
          <div class="input-group">
            <label>经度:</label>
            <input type="number" id="longitude" class="input" step="any" min="-180" max="180">
          </div>
        </div>
        <div class="input-group">
          <label>精度 (米):</label>
          <input type="number" id="accuracy" class="input" step="1" min="1">
        </div>
        <label class="checkbox-label">
          <input type="checkbox" id="randomize">
          <span>随机偏移</span>
        </label>
        <div class="input-group">
          <label>随机半径 (米):</label>
          <input type="number" id="randomRadiusMeters" class="input" step="1" min="0">
        </div>
        <label class="checkbox-label">
          <input type="checkbox" id="spoofPermission">
          <span>伪装地理位置权限</span>
        </label>
      </div>
      </div>

      <div class="tab-content" data-tab="timezone">
        <label class="checkbox-label">
          <input type="checkbox" id="timezoneEnabled">
          <span>启用时区伪装</span>
        </label>
        <div class="input-group">
          <label>时区:</label>
          <input type="text" id="timezone" class="input" placeholder="Asia/Singapore">
        </div>
        <div class="input-group">
          <label>UTC 偏移 (小时):</label>
          <input type="number" id="utcOffset" class="input" step="0.5" placeholder="-7">
          <small style="color: #888; display: block; margin-top: 4px;">例如：-7 表示 UTC-7 (洛杉矶)，+8 表示 UTC+8 (新加坡)</small>
        </div>
      </div>

      <div class="tab-content" data-tab="language">
        <label class="checkbox-label">
          <input type="checkbox" id="languageEnabled">
          <span>启用语言伪装</span>
        </label>
        <div class="input-group">
          <label>主语言:</label>
          <input type="text" id="language" class="input" placeholder="en-US">
        </div>
        <div class="input-group">
          <label>语言列表:</label>
          <input type="text" id="languages" class="input" placeholder="en-US, en">
        </div>
        <div class="input-group">
          <label>Accept-Language:</label>
          <input type="text" id="acceptLanguage" class="input" placeholder="en-US,en;q=0.9">
        </div>
      </div>

      <div class="tab-content" data-tab="webrtc">
        <label class="checkbox-label">
          <input type="checkbox" id="webrtcEnabled">
          <span>启用 WebRTC 防泄漏</span>
        </label>
        <div class="input-group">
          <label>策略:</label>
          <select id="webrtcPolicy" class="input">
            <option value="default">默认</option>
            <option value="default_public_interface_only">仅公网接口</option>
            <option value="default_public_and_private_interfaces">公网和私网</option>
            <option value="disable_non_proxied_udp">禁用非代理 UDP（推荐）</option>
          </select>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>预设配置</h2>
      <p class="section-description">点击"应用"快速切换到预设配置</p>
      <div id="defaultProfiles" class="profiles-grid"></div>
    </section>

    <section class="section">
      <h2>自定义配置文件</h2>
      <p class="section-description">保存你自己的配置方案，方便快速切换</p>
      <div id="customProfiles" class="profiles-grid"></div>
    </section>

    <section class="section">
      <h2>站点特定规则</h2>
      <p class="section-description">站点特定规则优先级高于匹配模式，可以为特定网站设置例外</p>
      <div id="siteRules"></div>
    </section>

    <section class="section">
      <h2>数据管理</h2>
      <div class="data-actions">
        <button id="exportConfig" class="btn-secondary">导出完整配置</button>
        <button id="importConfig" class="btn-secondary">导入配置</button>
        <button id="resetAll" class="btn-danger">重置所有数据</button>
        <input type="file" id="importFile" accept=".json" style="display: none;">
      </div>
    </section>

    <footer>
      <button id="save" class="btn-primary">保存当前配置</button>
    </footer>
  </div>

  <!-- Save Profile Modal -->
  <div id="saveProfileModal" class="modal">
    <div class="modal-content">
      <h2>另存为自定义配置</h2>
      <div class="modal-body">
        <div class="input-group">
          <label>配置名称:</label>
          <input type="text" id="newProfileName" class="input" placeholder="我的配置">
        </div>
        <div class="input-group">
          <label>描述（可选）:</label>
          <input type="text" id="newProfileDescription" class="input" placeholder="配置说明">
        </div>
      </div>
      <div class="modal-footer">
        <button id="confirmSaveProfile" class="btn-primary">保存</button>
        <button id="cancelSaveProfile" class="btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
